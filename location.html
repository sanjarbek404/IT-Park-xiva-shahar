<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location - Markazga yo'l</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            height: 100vh;
            width: 100vw;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .back-btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'">Bosh sahifaga qaytish</button>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Markaz koordinatalari (o'zingiz belgilang)
        const centerLat = 41.38703798002611; // Toshkent markazi
        const centerLng = 60.36266084051584;

        // Xarita yaratish
        const map = L.map('map').setView([centerLat, centerLng], 13);

        // OpenStreetMap qatlamini qo'shish
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Markaz markerini qo'shish
        const centerMarker = L.marker([centerLat, centerLng]).addTo(map)
            .bindPopup("<b>Markaz joylashuvi</b>").openPopup();

        // Foydalanuvchi joylashuvini aniqlash
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;

                // Foydalanuvchi markerini qo'shish
                const userMarker = L.marker([userLat, userLng]).addTo(map)
                    .bindPopup("<b>Sizning joylashuvingiz</b>").openPopup();

                // Markazgacha bo'lgan yo'lni chizish
                const route = L.polyline([
                    [userLat, userLng],
                    [centerLat, centerLng]
                ], { color: 'blue', weight: 4 }).addTo(map);

                // Xarita chegaralarini moslashtirish
                map.fitBounds(route.getBounds(), { padding: [50, 50] });
            }, function(error) {
                alert("Joylashuvni aniqlab bo'lmadi: " + error.message);
            });
        } else {
            alert("Brauzeringiz geolokatsiyani qo'llab-quvvatlamaydi.");
        }
    </script>
</body>
</html>
